name: douban-monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install-deps
        run: pip install requests feedparser

      - name: run-monitor
        env:
          DOUBAN_USER_ID: ${{ secrets.DOUBAN_USER_ID }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        run: python monitor.py

      - uses: actions/cache@v4
        with:
          path: state.json
          key: state-${{ secrets.DOUBAN_USER_ID }}
          restore-keys: state-

      - name: push-state
        run: |
         git config user.name bot
          git config user.email bot@bot.com
          if [ -f state.json ]; then
            git add state.json
            git diff --staged --quiet || git commit -m update
            git push
          fi
